apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: filebrowser
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.com/antonk404/matkini-infra.git
    targetRevision: HEAD
    path: charts/filebrowser
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
