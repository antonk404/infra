apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quiz-core
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/antonk404/quiz-core-svc
    targetRevision: HEAD
    path: charts/quiz-core
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
