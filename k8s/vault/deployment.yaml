apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: antlers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      nodeSelector:
        role: hub
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      hostNetwork: true
      securityContext:
        runAsUser: 100
        runAsGroup: 1000
      containers:
        - name: vault
          image: hashicorp/vault:latest
          command:
            - vault
            - server
            - -config=/vault/config/vault.hcl
          env:
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: core-vault-token
                  key: token
          ports:
            - containerPort: 8200
            - containerPort: 8201
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /vault/config
            - name: data
              mountPath: /vault/data
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
      volumes:
        - name: config
          configMap:
            name: vault-config
        - name: data
          persistentVolumeClaim:
            claimName: vault-data
