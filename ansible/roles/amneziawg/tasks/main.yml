- name: Check if awg is installed
  command: which awg
  register: awg_check
  failed_when: false
  changed_when: false

- name: Install software-properties-common
  apt:
    name: software-properties-common
    state: present
  when: awg_check.rc != 0

- name: Add AmneziaWG apt repository
  apt_repository:
    repo: "ppa:amnezia/ppa"
    state: present
    update_cache: yes
  when: awg_check.rc != 0

- name: Install AmneziaWG
  apt:
    name:
      - amneziawg
      - amneziawg-tools
    state: present
  when: awg_check.rc != 0

- name: Ensure routing tables are defined
  lineinfile:
    path: /etc/iproute2/rt_tables
    line: "{{ item }}"
    state: present
  loop:
    - "201 wgshared"

- name: Ensure amneziawg config directory exists
  file:
    path: /etc/amnezia/amneziawg
    state: directory
    owner: root
    mode: '0700'

- name: Find AWG interfaces
  find:
    paths: "{{ role_path }}/files/{{ group_names | difference(['all']) | first }}/{{ inventory_hostname }}"
    patterns: "*.conf"
  register: awg_conf_files
  delegate_to: localhost

- name: Get AWG private keys from Vault
  community.hashi_vault.vault_kv2_get:
    url: "http://30.0.0.1:8200"
    path: "{{ group_names | difference(['all']) | first }}/{{ inventory_hostname }}/{{ item.path | basename | splitext | first }}"
    engine_mount_point: infra
    token: "{{ lookup('env', 'VAULT_TOKEN') }}"
  register: awg_vault_secrets
  loop: "{{ awg_conf_files.files }}"
  delegate_to: localhost

- name: Deploy AWG configs with injected private keys
  copy:
    content: "{{ lookup('file', item.item.path) | regex_replace('PrivateKey = VAULT_MANAGED', 'PrivateKey = ' + item.secret.private_key) }}"
    dest: "/etc/amnezia/amneziawg/{{ item.item.path | basename }}"
    owner: root
    mode: '0600'
  loop: "{{ awg_vault_secrets.results }}"
  notify: restart awg-quick

- name: Ensure AWG services are running
  systemd:
    name: "awg-quick@{{ item.item.path | basename | splitext | first }}"
    state: started
    enabled: yes
  loop: "{{ awg_vault_secrets.results }}"

- name: Deploy awg0 PostUp script
  copy:
    src: awg0-postup.sh
    dest: /usr/local/bin/awg0-postup.sh
    owner: root
    mode: '0755'
  when: "'gate' in group_names"

- name: Deploy awg0 PostDown script
  copy:
    src: awg0-postdown.sh
    dest: /usr/local/bin/awg0-postdown.sh
    owner: root
    mode: '0755'
  when: "'gate' in group_names"

- name: Deploy switch-hub script
  copy:
    src: switch-hub.sh
    dest: /usr/local/bin/switch-hub
    owner: root
    mode: '0755'
  when: "'gate' in group_names"

- name: Deploy awg-hub-router systemd service
  copy:
    src: awg-hub-router.service
    dest: /etc/systemd/system/awg-hub-router.service
    owner: root
    mode: '0644'
  when: "'gate' in group_names"

- name: Enable and start awg-hub-router service
  systemd:
    name: awg-hub-router
    state: started
    enabled: yes
    daemon_reload: yes
  when: "'gate' in group_names"
