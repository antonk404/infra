apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitsi-web
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jitsi-web
  template:
    metadata:
      labels:
        app: jitsi-web
    spec:
      nodeSelector:
        role: hub
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: web
          image: jitsi/web:{{ .Values.imageTag }}
          env:
            - name: ENABLE_AUTH
              value: "0"
            - name: ENABLE_GUESTS
              value: "1"
            - name: ENABLE_LETSENCRYPT
              value: "0"
            - name: ENABLE_HTTP_REDIRECT
              value: "0"
            - name: ENABLE_TRANSCRIPTIONS
              value: "0"
            - name: DISABLE_HTTPS
              value: "0"
            - name: JICOFO_AUTH_USER
              value: focus
            - name: XMPP_DOMAIN
              value: {{ .Values.xmpp.domain }}
            - name: XMPP_AUTH_DOMAIN
              value: {{ .Values.xmpp.authDomain }}
            - name: XMPP_BOSH_URL_BASE
              value: http://prosody:5280
            - name: XMPP_MUC_DOMAIN
              value: {{ .Values.xmpp.mucDomain }}
            - name: PUBLIC_URL
              value: {{ .Values.web.publicUrl }}
            - name: TZ
              value: {{ .Values.timezone }}
          ports:
            - containerPort: 443
              hostPort: 8443
              protocol: TCP
            - containerPort: 80
              hostPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: {{ .Values.web.resources.requests.cpu }}
              memory: {{ .Values.web.resources.requests.memory }}
            limits:
              cpu: {{ .Values.web.resources.limits.cpu }}
              memory: {{ .Values.web.resources.limits.memory }}
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          emptyDir: {}
