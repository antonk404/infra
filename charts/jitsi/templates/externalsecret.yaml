apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jitsi-secret
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: jitsi-secret
  data:
    - secretKey: jicofo-component-secret
      remoteRef:
        key: {{ .Values.secret.vaultPath }}
        property: jicofo_component_secret
    - secretKey: jicofo-auth-password
      remoteRef:
        key: {{ .Values.secret.vaultPath }}
        property: jicofo_auth_password
    - secretKey: jvb-auth-password
      remoteRef:
        key: {{ .Values.secret.vaultPath }}
        property: jvb_auth_password
