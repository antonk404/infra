apiVersion: apps/v1
kind: Deployment
metadata:
  name: stepik-adapter
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stepik-adapter
  template:
    metadata:
      labels:
        app: stepik-adapter
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: stepik-adapter
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: SOLVER_API_URL
              value: {{ .Values.env.solverApiUrl | quote }}
            - name: CALLBACK_BASE_URL
              value: {{ .Values.env.callbackBaseUrl | quote }}
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.env.datasourceUrl | quote }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.env.datasourceUsername | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stepik-adapter-secret
                  key: postgres-password
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stepik-adapter-secret
                  key: telegram-bot-token
            - name: TELEGRAM_BOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: stepik-adapter-secret
                  key: telegram-bot-username
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
