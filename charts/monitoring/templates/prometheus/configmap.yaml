apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.namespace }}
data:
  prometheus.yaml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.scrapeInterval }}

    scrape_configs:
      - job_name: 'nodes'
        static_configs:
          {{- range .Values.prometheus.nodes }}
          - targets:
              - '{{ .address }}'
            labels:
              alias: '{{ .alias }}'
              env: '{{ .env }}'
          {{- end }}
