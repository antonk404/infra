apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-secret
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: grafana-secret
  data:
    - secretKey: admin-user
      remoteRef:
        key: {{ .Values.grafana.secret.vaultPath }}
        property: admin_user
    - secretKey: admin-password
      remoteRef:
        key: {{ .Values.grafana.secret.vaultPath }}
        property: admin_password
