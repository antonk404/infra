apiVersion: apps/v1
kind: Deployment
metadata:
  name: element
  namespace: {{ .Values.namespace }}
spec:
  replicas: 0
  selector:
    matchLabels:
      app: element
  template:
    metadata:
      labels:
        app: element
    spec:
      nodeSelector:
        role: hub
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: element
          image: {{ .Values.element.image.repository }}:{{ .Values.element.image.tag }}
          ports:
            - containerPort: {{ .Values.element.service.port }}
          resources:
            requests:
              cpu: {{ .Values.element.resources.requests.cpu }}
              memory: {{ .Values.element.resources.requests.memory }}
            limits:
              cpu: {{ .Values.element.resources.limits.cpu }}
              memory: {{ .Values.element.resources.limits.memory }}
          volumeMounts:
            - name: config
              mountPath: /app/config.json
              subPath: config.json
      volumes:
        - name: config
          configMap:
            name: element-config
